baseurl = "/"
languageCode = "en-us"
theme = "hello-friend-ng"

paginate = 5

[params]
  # dir name of your blog content (default is `content/posts`)
  contentTypeName = "posts"
  # "light" or "dark"
  defaultTheme = "dark"
  # If you set this to 0, only submenu trigger will be visible
  showMenuItems = 3
  # Show reading time in minutes for posts
  showReadingTime = false
  # Add Home tile
  homeSubtitle = "Security Engineer By Day and Open-Source Hacker by Night."

[languages]
  [languages.en]
    title = "NixBytes"
    subtitle = "Security Engineer By Day and Open-Source Hacker by Night."
    keywords = "Security Open-Source"
    copyright = "MIT"
    menuMore = "Show more"
    writtenBy = "Written by"
    readMore = "Read more"
    readOtherPosts = "Read other posts"
    newerPosts = "Newer posts"
    olderPosts = "Older posts"
    minuteReadingTime = "min read"
    dateFormatSingle = "2006-01-02"
    dateFormatList = "2006-01-02"
    
    [languages.en.params.logo]
      logoText = "NixBytes"
      logoHomeLink = "/"
     alt = "Security Engineer By Day and Open-Source Hacker by Night."

    [[params.social]]
      name = "github"
      url  = "https://github.com/nixbytes"
    [[params.social]]
      name = "email"
      url  = "mailto:real8686@gmail.com"

    [[languages.en.menu.main]]
      identifier = "blog"
      name = "Blog"
      url = "/posts"
    [[languages.en.menu.main]]
      identifier = "about"
      name = "About"
      url = "/about"

[taxonomies]
  tag      = "tags"
  category = "categories"
